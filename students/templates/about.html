<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f6fa;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        .about-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .about-box h1 {
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .about-box p {
            color: #555;
            font-size: 18px;
            line-height: 1.6;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .about-box {
                padding: 20px;
            }

            .about-box h1 {
                font-size: 24px;
            }

            .about-box p {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    {% include 'nav.html' %}

    <div class="container">
        <div class="about-box">
            <h1>About Us</h1>
            <p>
                Welcome to our Student Management System. This platform helps manage 
                student data efficiently, including adding, updating, searching, and deleting records.
            </p>
        </div>
    </div>

</body>
</html>
