
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }
        body{
            height: 100vh;
            width: 100%;
        }
        .base {
              height:89%;
              display: flex;
              background-image: url(https://www.shutterstock.com/image-vector/dark-bluepurple-background-shining-neon-600nw-2450893247.jpg);
              background-size:cover;
              padding: 40px;
        }

        .content {
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            padding: 60px 40px;
            font-size: 50px;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            text-align: center;
            background-color: rgba(74, 72, 72, 0.417);
            box-shadow: 0 0 5px 8px white;
            margin-right: 40px;
        }

        .image {
            border: 2px solid white;
            width: 70%;
            border-radius: 8px;
            box-shadow: 0 0 5px 8px white;
            animation: ani 8s alternate infinite linear;
        }

        @keyframes ani {
            0% {
                background-image: url(https://www.shutterstock.com/image-photo/university-student-writing-while-using-600nw-2442495581.jpg);
                background-size: 100% 100%;

            }

            33% {
                background-image: url(https://www.nasca.edu.in/learning-centre/wp-content/uploads/2019/10/students-future-740x493.jpg);
                background-size: 100% 100%;

            }

            66% {
                background-image: url(https://thumbs.dreamstime.com/b/note-book-laptop-pen-graph-paper-document-office-desk-table-behind-white-blind-86796417.jpg);
                background-size: 100% 100%;

            }

            100% {
                background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSMJoFktwNML6Mo0tJngAEoWgUHR3JwiVB1bg&s);
                background-size: 100% 100%;

            }
        }
    </style>

</head>

<body>
    {% include 'nav.html' %}
    <div class="base">
        <div class="content">
            Welcome <br> To <br>
            Student<br> Management
            <br>
            System
        </div>

        <div class="image"></div>


    </div>

</body>

</html>
