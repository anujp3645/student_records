<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Verdana, Geneva, Tahoma, sans-serif;
    background-image: url('https://t3.ftcdn.net/jpg/08/68/51/04/360_F_868510427_vsvN67LV1zSmLMyXMOFG05tRCmTAj1xL.jpg');
    background-size: cover;
    background-position: center;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* LOGIN BOX */
.login-container{
    background-color: rgba(255,255,255,0.6);
    padding:40px 30px;
    border-radius:12px;
    width:90%;
    max-width:350px;
    text-align:center;
    backdrop-filter: blur(10px);
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* IMAGE */
.login-container img{
    height:70px;
    margin-bottom:10px;
}

/* HEADING */
.login-heading{
    font-size:26px;
    margin-bottom:20px;
}

/* INPUT */
.input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
}

/* BUTTON */
.login-btn{
    width:100%;
    padding:10px;
    font-size:18px;
    background:#00bcd4;
    border:none;
    border-radius:20px;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    background:#008c9e;
}

/* 📱 MOBILE */
@media(max-width:480px){
    .login-heading{
        font-size:22px;
    }
}
</style>

</head>

<body>

{% include 'nav.html' %}

<div class="login-container">

    <img src="https://icons.veryicon.com/png/o/miscellaneous/icon-icon-of-ai-intelligent-dispensing/login-user-name-1.png">

    <h2 class="login-heading">Login</h2>

    <form method="post">
        {% csrf_token %}

        <input type="text" placeholder="Username" name="username" class="input" required>

        <input type="password" placeholder="Password" name="password" class="input" required>

        <input type="submit" value="Login" class="login-btn">

    </form>

</div>

{% if error == "no" %}
<script>
    alert("Login successful")
    window.location = "{% url 'adminhome' %}"
</script>
{% endif %}

{% if error == "yes" %}
<script>
    alert("Invalid username or password")
</script>
{% endif %}

</body>
</html>
