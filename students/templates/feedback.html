<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(135deg,#e0eafc,#cfdef3);
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* HEADER */
.header{
    background: linear-gradient(135deg,#2c3e50,#34495e);
    color:white;
    padding:20px;
    text-align:center;
}

/* CONTAINER */
.container{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* FORM BOX */
.box{
    width:100%;
    max-width:450px;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    text-align:center;
    transition:0.3s;
}

.box:hover{
    transform:translateY(-5px);
}

/* TITLE */
h2{
    margin-bottom:20px;
    color:#2c3e50;
}

/* INPUTS */
input, textarea{
    width:100%;
    margin-bottom:15px;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

/* MOBILE */
@media(max-width:500px){
    .box{
        padding:20px;
    }
}
</style>

</head>
<body>

<div class="header">
    <h1>Feedback</h1>
</div>

<div class="container">
    <div class="box">
        <h2>Send Your Feedback</h2>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="name" placeholder="Enter Name" required>

            <input type="email" name="email" placeholder="Enter Email" required>

            <textarea name="message" rows="5" placeholder="Your Feedback" required></textarea>

            <button type="submit">Submit</button>
        </form>
    </div>
</div>

</body>
</html>
