<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(135deg,#e0eafc,#cfdef3);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* HEADER */
.header{
    width:100%;
    background:linear-gradient(135deg,#2c3e50,#34495e);
    color:white;
    padding:20px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.header h1{
    font-size:2rem;
}

/* FORM BOX */
.form-container{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    max-width:400px;
    width:90%;
    margin-top:40px;
    transition:0.3s;
}

.form-container:hover{
    transform:translateY(-5px);
}

.form-container h2{
    text-align:center;
    margin-bottom:20px;
    color:#2c3e50;
}

/* FORM */
.form-group{
    margin-bottom:15px;
}

label{
    font-weight:600;
    display:block;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

/* ERROR TEXT */
#set{
    color:red;
    font-size:13px;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    background:#3498db;
    color:white;
    font-weight:bold;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

/* MOBILE */
@media(max-width:480px){
    .header h1{
        font-size:1.5rem;
    }
}
</style>

</head>
<body>

<div class="header">
    <h1>Change Password</h1>
</div>

<div class="form-container">
    <h2>Update your Password</h2>

    <form method="POST" action="/update_password" onsubmit="return change_pass()">
        {% csrf_token %}

        <div class="form-group">
            <label>Current Password</label>
            <input type="password" name="old_p" required>
        </div>

        <div class="form-group">
            <label>New Password</label>
            <input type="password" id="np" name="new_p" required>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="conp" required>
            <div id="set"></div>
        </div>

        <button type="submit">Change Password</button>
    </form>
</div>

<script>
function change_pass(){
    let n = document.getElementById('np').value;
    let c = document.getElementById('conp').value;

    if(n !== c){
        document.getElementById('set').innerText = "Passwords do not match!";
        return false;
    }else{
        document.getElementById('set').innerText = "";
        return true;
    }
}
</script>

</body>
</html>
