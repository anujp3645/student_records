<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Student</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial;
}

body{
    background: linear-gradient(135deg,#e0eafc,#cfdef3);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* HEADER */
.header{
    background: linear-gradient(135deg,#2c3e50,#34495e);
    color:white;
    width:100%;
    padding:40px 20px;
    text-align:center;
}

.header h1{
    font-size:2rem;
}

/* SEARCH BOX */
.search-container{
    margin-top:40px;
    background: rgba(255,255,255,0.8);
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
    width:90%;
    max-width:500px;
    text-align:center;
}

.search-container h2{
    margin-bottom:20px;
}

/* INPUT + BUTTON */
.search_box{
    display:flex;
    gap:10px;
}

.search_box input{
    flex:1;
    padding:12px;
    border:2px solid #3498db;
    border-radius:8px;
    outline:none;
}

.search_box input:focus{
    border-color:#2980b9;
}

.search_box button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:linear-gradient(135deg,#3498db,#2980b9);
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.search_box button:hover{
    background:linear-gradient(135deg,#2980b9,#2471e3);
}

/* 📱 MOBILE */
@media(max-width:500px){
    .search_box{
        flex-direction:column;
    }

    .search_box button{
        width:100%;
    }
}
</style>

</head>

<body>

{% include 'nav.html' %}

<div class="header">
    <h1>Search Student Record</h1>
</div>

<div class="search-container">

    <h2>Find Student Record</h2>

    <form method="POST" class="search_box" action="/search_student">
        {% csrf_token %}

        <input type="text" name="name" placeholder="Enter Student Name" required>

        <button type="submit">Search</button>

    </form>

</div>

</body>
</html>
