<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Student</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f4f6f8;
}

/* HEADER */
.header{
    background: linear-gradient(135deg,#2c3e50,#34495e);
    color:white;
    padding:20px;
    text-align:center;
}

/* CONTAINER */
.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    align-items:center;
    padding:20px;
    gap:20px;
}

/* IMAGE */
.image{
    flex:1;
    text-align:center;
}

.image img{
    max-width:100%;
    height:auto;
}

/* FORM */
.form-container{
    flex:1;
    max-width:500px;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:15px;
}

form{
    display:flex;
    flex-direction:column;
}

label{
    margin-top:10px;
    font-weight:600;
}

input, select{
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
    margin-top:5px;
}

/* BUTTON */
button{
    margin-top:15px;
    padding:10px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

/* BACK LINK */
.back{
    display:block;
    text-align:center;
    margin-top:10px;
    color:#3498db;
}

/* MOBILE */
@media(max-width:768px){
    .container{
        flex-direction:column;
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>Student Records Dashboard</h1>
</div>

<div class="container">

    <!-- IMAGE -->
    <div class="image">
        <img src="https://static.vecteezy.com/system/resources/previews/011/153/363/non_2x/3d-web-developer-working-on-project-illustration-png.png">
    </div>

    <!-- FORM -->
    <div class="form-container">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <h2>Add / Edit Student</h2>

            <label>Full Name</label>
            <input type="text" name="fname" required value="{{data.fname|default:''}}">

            <label>Email</label>
            <input type="email" name="email" required value="{{data.email|default:''}}">

            <label>College</label>
            <input type="text" name="college" required value="{{data.college|default:''}}">

            <label>City</label>
            <input type="text" name="city" required value="{{data.city|default:''}}">

            <label>Join Date</label>
            <input type="date" name="jdate" required value="{{data.jdate|default:''}}">

            <label>Total Fee</label>
            <input type="number" name="tfee" id="a" required value="{{data.tfee|default:''}}">

            <label>Paid Fee</label>
            <input type="number" name="pfee" id="b" onkeyup="fee()" required value="{{data.pfee|default:''}}">

            <label>Left Fee</label>
            <input type="number" name="lfee" id="c" required value="{{data.lfee|default:''}}">

            <label>Phone</label>
            <input type="tel" name="phone" required value="{{data.phone|default:''}}">

            <label>Technology</label>
            <select name="technology">
                <option value="">Select Technology</option>
                <option value="python" {% if data.technology == "python" %}selected{% endif %}>Python</option>
                <option value="php" {% if data.technology == "php" %}selected{% endif %}>PHP</option>
                <option value="java" {% if data.technology == "java" %}selected{% endif %}>Java</option>
                <option value="Mern" {% if data.technology == "Mern" %}selected{% endif %}>MERN</option>
                <option value="Asp.net" {% if data.technology == "Asp.net" %}selected{% endif %}>ASP.NET</option>
            </select>

            <label>Upload Image</label>
            <input type="file" name="image">

            <button type="submit">Submit</button>

            <a href="{% url 'adminhome' %}" class="back">Back to Dashboard</a>
        </form>
    </div>

</div>

<script>
function fee(){
    let total = Number(document.getElementById('a').value);
    let paid = Number(document.getElementById('b').value);
    document.getElementById('c').value = total - paid;
}
</script>

{% if error == "no" %}
<script>
    alert("Data inserted successfully");
    window.location="{% url 'view_stu' %}";
</script>
{% endif %}

{% if error == "yes" %}
<script>
    alert("Something went wrong");
</script>
{% endif %}

</body>
</html>
