<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial;
}

/* NAVBAR */
.home-base{
    background:#2c3e50;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* LOGO */
.logo{
    color:white;
    font-size:22px;
    font-weight:bold;
}

/* MENU */
.home-menu{
    list-style:none;
    display:flex;
}

.home-menu li{
    margin-left:15px;
}

.home-menu li a{
    text-decoration:none;
    color:white;
    padding:8px 15px;
    border-radius:5px;
    transition:0.3s;
}

.home-menu li a:hover{
    background:#3498db;
}

/* HAMBURGER */
.menu-toggle{
    display:none;
    font-size:25px;
    color:white;
    cursor:pointer;
}

/* 📱 MOBILE */
@media(max-width:768px){

    .menu-toggle{
        display:block;
    }

    .home-menu{
        position:absolute;
        top:60px;
        right:0;
        background:#2c3e50;
        flex-direction:column;
        width:200px;
        display:none;
    }

    .home-menu.active{
        display:flex;
    }

    .home-menu li{
        margin:10px 0;
        text-align:center;
    }
}
</style>
</head>

<body>

<div class="home-base">

    <div class="logo">StudentApp</div>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <ul class="home-menu" id="menu">
        <li><a href="{% url 'index' %}">Home</a></li>
        <li><a href="{% url 'login' %}">Login</a></li>
        <li><a href="{% url 'about' %}">About</a></li>
        <li><a href="{% url 'contact' %}">Contact</a></li>
    </ul>

</div>

<script>
function toggleMenu(){
    document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
