<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(135deg,#e0eafc,#cfdef3);
    min-height: 100vh;
}

/* HEADER */
.header{
    background: linear-gradient(135deg,#2c3e50,#34495e);
    color: white;
    padding: 20px;
    text-align: center;
}

.header h1{
    font-size: 2rem;
}

/* CONTAINER */
.container{
    max-width: 1200px;
    margin: 30px auto;
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap: 25px;
    padding: 0 15px;
}

/* CARD */
.card{
    background: white;
    border-radius: 15px;
    padding: 30px 20px;
    text-align: center;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
}

.card:hover{
    transform: translateY(-10px) scale(1.02);
}

/* ICON */
.card img{
    width: 70px;
    margin-bottom: 10px;
}

/* TITLE */
.card h2{
    margin-bottom: 10px;
    color: #2c3e50;
}

/* BUTTON */
.card a{
    display: inline-block;
    padding: 10px 18px;
    background: #3498db;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    transition: 0.3s;
}

.card a:hover{
    background: #2980b9;
}

/* RESPONSIVE */
@media (max-width: 600px){
    .header h1{
        font-size: 1.5rem;
    }

    .card{
        padding: 20px;
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>Student Records Dashboard</h1>
</div>

<div class="container">

    <div class="card">
        <img src="https://img.icons8.com/?size=100&id=CZFKq1Gi78GG">
        <h2>Add Student</h2>
        <a href="{% url 'add_stu' %}">Go</a>
    </div>

    <div class="card">
        <img src="https://img.icons8.com/?size=100&id=11971">
        <h2>View Student</h2>
        <a href="{% url 'view_stu' %}">Go</a>
    </div>

    <div class="card">
        <img src="https://img.icons8.com/?size=100&id=12773">
        <h2>Search Records</h2>
        <a href="{% url 'search_stu' %}">Go</a>
    </div>

    <div class="card">
        <img src="https://img.icons8.com/?size=100&id=DTdiAnVTTHBo">
        <h2>Account</h2>
        <a href="{% url 'change_pass' %}">Go</a>
    </div>

    <div class="card">
        <img src="https://img.icons8.com/?size=100&id=13925">
        <h2>Logout</h2>
        <a href="{% url 'login' %}">Logout</a>
    </div>

    <div class="card">
        <img src="https://img.icons8.com/?size=100&id=XFOumBmRR5zT">
        <h2>View Feedback</h2>
        <a href="{% url 'feedback' %}">Go</a>
    </div>

</div>

</body>
</html>
