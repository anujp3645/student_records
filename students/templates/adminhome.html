<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Trebuchet MS', Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg,#e0eafc,#cfdef3);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        span{
            background: linear-gradient(135deg,#2c3e50,#34495e);
            color: #fff;
            padding: 25px;
            text-align: center;
        }

        h1{
            font-size: 2.3rem;
        }

        .container{
            max-width: 1100px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
            gap:25px;
            padding: 0 20px;
        }

        .card{
            background: rgba(255,255,255,0.9);
            border-radius: 15px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover{
            transform: translateY(-8px);
        }

        .card img{
            width: 70px;
        }

        .card a{
            display: inline-block;
            margin-top: 12px;
            padding: 10px 15px;
            background: #3498db;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }

        .card a:hover{
            background: #2980b9;
        }
    </style>
</head>

<body>

    <span>
        <h1>Student Records Dashboard</h1>
    </span>

    <div class="container">

        <div class="card">
            <img src="https://img.icons8.com/?size=100&id=CZFKq1Gi78GG&format=png&color=000000">
            <h2>Add Student</h2>
            <a href="{% url 'add_stu' %}">Go</a>
        </div>

        <div class="card">
            <img src="https://img.icons8.com/?size=100&id=11971&format=png&color=000000">
            <h2>View Student</h2>
            <a href="{% url 'view_stu' %}">Go</a>
        </div>

        <div class="card">
            <img src="https://img.icons8.com/?size=100&id=12773&format=png&color=000000">
            <h2>Search Records</h2>
            <a href="{% url 'search_stu' %}">Go</a>
        </div>

        <div class="card">
            <img src="https://img.icons8.com/?size=100&id=DTdiAnVTTHBo&format=png&color=000000">
            <h2>Account</h2>
            <a href="{% url 'change_pass' %}">Go</a>
        </div>

        <div class="card">
            <img src="https://img.icons8.com/?size=100&id=13925&format=png&color=000000">
            <h2>Logout</h2>
            <a href="{% url 'login' %}">Logout</a>
        </div>

        <div class="card">
            <img src="https://img.icons8.com/?size=100&id=XFOumBmRR5zT&format=png&color=000000">
            <h2>View Feedback</h2>
            <a href="{% url 'feedback' %}">Go</a>
        </div>

    </div>

</body>
</html>
